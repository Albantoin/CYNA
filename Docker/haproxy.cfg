# ============================================================
# Configuration HAProxy — Reverse-proxy CYNA
# ============================================================

global
    log stdout format raw local0
    maxconn 4096
    daemon

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    timeout connect 5000ms
    timeout client  50000ms
    timeout server  50000ms

# Page de statistiques HAProxy
listen stats
    bind *:8404
    mode http
    stats enable
    stats uri /
    stats refresh 10s
    stats admin if TRUE

# Frontend HTTP
frontend http_front
    bind *:80
    mode http

    # Routage par nom de domaine
    acl host_zabbix hdr(host) -i zabbix.cyna.local
    acl host_wazuh  hdr(host) -i wazuh.cyna.local

    use_backend zabbix_backend if host_zabbix
    use_backend wazuh_backend  if host_wazuh

    default_backend zabbix_backend

# Backend Zabbix
backend zabbix_backend
    mode http
    balance roundrobin
    server zabbix1 zabbix-web:8080 check

# Backend Wazuh
backend wazuh_backend
    mode http
    balance roundrobin
    server wazuh1 wazuh-dashboard:5601 check